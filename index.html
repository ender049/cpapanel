<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPA 管理面板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg0:#0f172a;--bg1:#1e293b;--bg2:#334155;--t1:#f1f5f9;--t2:#94a3b8;--acc:#3b82f6;--acc2:#2563eb;--ok:#22c55e;--warn:#f59e0b;--err:#ef4444;--bdr:#475569}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg0);color:var(--t1);min-height:100vh;font-size:14px}
.ctn{max-width:1600px;margin:0 auto;padding:16px 20px}
.b{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.bp{background:var(--acc);color:#fff}.bp:hover{background:var(--acc2)}
.bs{background:var(--bg2);color:var(--t1)}.bs:hover{background:var(--bdr)}
.bd{background:var(--err);color:#fff}.bd:hover{background:#dc2626}
.bsm{padding:4px 10px;font-size:12px}
.b:disabled{opacity:.5;cursor:not-allowed}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--bdr);flex-wrap:wrap;gap:8px}
.hdr h1{font-size:22px;font-weight:700}
.hdr-right{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.hdr-info{display:flex;gap:14px;align-items:center}
.hdr-info .si{gap:4px;font-size:12px}
.hdr-info .sv{font-size:16px}
.hdr-info .sl{font-size:11px}
.main-tabs{display:flex;gap:0;border-bottom:2px solid var(--bdr);margin-bottom:16px}
.main-tab{padding:11px 28px;font-size:15px;font-weight:600;cursor:pointer;color:var(--t2);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.main-tab:hover{color:var(--t1)}.main-tab.active{color:var(--acc);border-bottom-color:var(--acc)}
.main-panel{display:none}.main-panel.active{display:block}
.fbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.fbar select{padding:6px 10px;border-radius:6px;border:1px solid var(--bdr);background:var(--bg2);color:var(--t1);font-size:12px}
.fbar-label{font-size:11px;color:var(--t2)}
.bgroup{display:flex;gap:1px;background:var(--bg2);border-radius:6px;padding:2px}
.bgroup button{border:none;background:transparent;color:var(--t2);padding:4px 12px;border-radius:4px;cursor:pointer;font-size:12px}
.bgroup button.active{background:var(--acc);color:#fff}
.tbar{background:var(--bg1);border-radius:8px;padding:12px 16px;margin-bottom:14px;display:flex;gap:18px;flex-wrap:wrap;align-items:center}
.tb-t{font-size:13px;font-weight:600;color:var(--t2);margin-right:4px}
.si{display:flex;align-items:center;gap:4px;font-size:12px}
.sv{font-weight:700;font-size:16px}
.sl{color:var(--t2);font-size:11px}
.bdg{padding:2px 7px;border-radius:3px;font-size:11px;font-weight:500;display:inline-block;white-space:nowrap}
.bdg-claude{background:rgba(180,132,255,.15);color:#c084fc}.bdg-codex{background:rgba(16,185,129,.15);color:#10b981}
.bdg-gemini_cli{background:rgba(251,191,36,.15);color:#fbbf24}.bdg-anti{background:rgba(251,146,60,.15);color:#fb923c}
.bdg-kimi{background:rgba(14,165,233,.15);color:#0ea5e9}
.bdg-ok{background:rgba(34,197,94,.15);color:var(--ok)}.bdg-err{background:rgba(239,68,68,.15);color:var(--err)}
.bdg-warn{background:rgba(245,158,11,.15);color:var(--warn)}.bdg-plan{background:rgba(99,102,241,.15);color:#818cf8}
.bdg-on{background:rgba(34,197,94,.15);color:var(--ok)}.bdg-off{background:rgba(239,68,68,.15);color:var(--err)}
.ld{display:inline-block;width:14px;height:14px;border:2px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease-out}
@keyframes dataFlash{0%{background:rgba(59,130,246,.25);box-shadow:inset 0 0 0 1px rgba(59,130,246,.4)}50%{background:rgba(59,130,246,.15);box-shadow:inset 0 0 0 1px rgba(59,130,246,.2)}100%{background:transparent;box-shadow:inset 0 0 0 1px transparent}}
.data-flash{animation:dataFlash .8s ease-out}
.font-size-sm{font-size:13px}.font-size-sm .b{font-size:12px}.font-size-sm .bsm{font-size:11px}.font-size-sm .sv{font-size:15px}.font-size-sm .sn{font-size:14px}.font-size-sm .bdg{font-size:11px}.font-size-sm .sec-title{font-size:14px}.font-size-sm .tw table{font-size:12px}.font-size-sm .tw .mono{font-size:11px}.font-size-sm .si{font-size:12px}.font-size-sm .sl{font-size:11px}.font-size-sm .sd-i{font-size:12px}.font-size-sm .hdr h1{font-size:20px}.font-size-sm .main-tab{font-size:14px}.font-size-sm .fc-name{font-size:12px}.font-size-sm .fc-acc{font-size:11px}.font-size-sm .qih,.font-size-sm .ql,.font-size-sm .qv{font-size:11px}.font-size-sm .qload,.font-size-sm .qempty{font-size:11px}.font-size-sm .fbar select,.font-size-sm .sec-controls select{font-size:12px}.font-size-sm .bgroup button{font-size:12px}.font-size-sm .fbar-label{font-size:11px}
.font-size-md{font-size:15px}.font-size-md .b{font-size:14px}.font-size-md .bsm{font-size:12px}.font-size-md .sv{font-size:17px}.font-size-md .sn{font-size:16px}.font-size-md .bdg{font-size:12px}.font-size-md .sec-title{font-size:16px}.font-size-md .tw table{font-size:13px}.font-size-md .tw .mono{font-size:12px}.font-size-md .si{font-size:13px}.font-size-md .sl{font-size:12px}.font-size-md .sd-i{font-size:13px}.font-size-md .hdr h1{font-size:23px}.font-size-md .main-tab{font-size:16px}.font-size-md .fc-name{font-size:14px}.font-size-md .fc-acc{font-size:13px}.font-size-md .qih,.font-size-md .ql,.font-size-md .qv{font-size:13px}.font-size-md .qload,.font-size-md .qempty{font-size:13px}.font-size-md .fbar select,.font-size-md .sec-controls select{font-size:13px}.font-size-md .bgroup button{font-size:13px}.font-size-md .fbar-label{font-size:12px}
.font-size-lg{font-size:17px}.font-size-lg .b{font-size:15px}.font-size-lg .bsm{font-size:13px}.font-size-lg .sv{font-size:20px}.font-size-lg .sn{font-size:18px}.font-size-lg .bdg{font-size:13px}.font-size-lg .sec-title{font-size:18px}.font-size-lg .tw table{font-size:14px}.font-size-lg .tw .mono{font-size:13px}.font-size-lg .si{font-size:14px}.font-size-lg .sl{font-size:13px}.font-size-lg .sd-i{font-size:14px}.font-size-lg .hdr h1{font-size:26px}.font-size-lg .main-tab{font-size:18px}.font-size-lg .fc-name{font-size:15px}.font-size-lg .fc-acc{font-size:14px}.font-size-lg .qih,.font-size-lg .ql,.font-size-lg .qv{font-size:14px}.font-size-lg .qload,.font-size-lg .qempty{font-size:14px}.font-size-lg .fbar select,.font-size-lg .sec-controls select{font-size:14px}.font-size-lg .bgroup button{font-size:14px}.font-size-lg .fbar-label{font-size:13px}
.font-sel{padding:3px 6px;border-radius:4px;border:1px solid var(--bdr);background:var(--bg2);color:var(--t1);font-size:11px}
.pbar{height:5px;background:var(--bg0);border-radius:3px;overflow:hidden;margin-top:3px}
.pfill{height:100%;border-radius:3px;transition:width .3s}
.pfill.h{background:var(--err)}.pfill.m{background:var(--warn)}.pfill.l{background:var(--ok)}
.ss{margin-bottom:20px}
.sb{background:var(--bg1);border-radius:8px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;cursor:pointer;user-select:none}
.sb:hover{background:#1e2d44}
.sir{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}.dot.on{background:var(--ok);box-shadow:0 0 4px var(--ok)}.dot.off{background:var(--err)}
.sn{font-size:15px;font-weight:600;display:flex;align-items:center;gap:6px}
.arrow{display:inline-block;width:0;height:0;border-left:5px solid var(--t2);border-top:4px solid transparent;border-bottom:4px solid transparent;transition:transform .2s}
.arrow.col{transform:rotate(-90deg)}
.sd{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:3px}
.sd-i{font-size:12px;color:var(--t2);display:flex;align-items:center;gap:3px}
.sd-i strong{color:var(--t1)}
.su{background:var(--bg1);padding:8px 16px;display:flex;gap:14px;flex-wrap:wrap;align-items:center;border-top:1px solid var(--bdr);border-radius:0}
.su-i{display:flex;align-items:center;gap:4px;font-size:12px}
.su-v{font-weight:700;color:var(--t1)}.su-l{color:var(--t2)}
.s-act{display:flex;gap:4px;flex-shrink:0}
.sbdy{background:var(--bg0);border-radius:0 0 8px 8px;padding:14px 12px;border-top:1px solid var(--bdr)}
.sbdy.col{display:none}
.fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}
.fsec+.fsec{margin-top:16px;padding-top:14px;border-top:1px dashed rgba(71,85,105,.6)}
.fsec-h{display:flex;align-items:center;gap:6px;margin:0 0 10px 2px;font-size:12px;font-weight:600;color:var(--t2)}
.fsec-h.warn{color:var(--warn)}
.fc{background:var(--bg2);border-radius:8px;border:1px solid var(--bdr);overflow:hidden}
.fc-top{padding:12px 12px 0}
.fc-line1{display:flex;align-items:center;gap:5px}
.fc-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.fc-acts{display:flex;gap:3px;flex-shrink:0}
.fc-acts .b{font-size:11px;padding:2px 7px}
.fc-line2{display:flex;align-items:center;gap:4px;margin-top:5px;flex-wrap:wrap}
.fc-acc{font-size:12px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:4px}
.fc-sep{border-top:1px solid var(--bdr);margin-top:10px}
.fc-body{padding:10px 12px 12px}
.qi{margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid rgba(71,85,105,.4)}
.qi:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.qih{display:flex;justify-content:space-between;align-items:center;font-size:12px;margin-bottom:3px;gap:4px}
.ql{color:var(--t2);flex-shrink:0}.qv{font-weight:600;text-align:right;font-size:12px}
.qm{font-size:10px;color:var(--t2);margin-top:1px}
.qe{color:var(--err);font-size:11px;padding:6px;background:rgba(239,68,68,.08);border-radius:4px}
.qload{display:flex;align-items:center;justify-content:center;gap:6px;color:var(--t2);font-size:12px;padding:10px 0}
.qempty{text-align:center;color:var(--t2);font-size:12px;padding:10px 0;cursor:pointer}
.qempty:hover{color:var(--acc)}
.sec-title{font-size:14px;font-weight:500;margin-bottom:10px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;padding:7px 14px;border-radius:6px;background:var(--bg1);border:1px solid var(--bdr);transition:all .15s}
.sec-title:hover{border-color:var(--acc);color:var(--acc)}
.sec-title .arrow{display:inline-block;width:0;height:0;border-left:5px solid var(--t2);border-top:4px solid transparent;border-bottom:4px solid transparent;transition:transform .2s}
.sec-title .arrow.col{transform:rotate(-90deg)}
.sec-title .st-label{display:inline-flex;align-items:center;gap:6px}
.sec-title .st-icon{font-size:13px;opacity:.7}
.sec-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.sec-controls select{padding:5px 10px;border-radius:5px;border:1px solid var(--bdr);background:var(--bg2);color:var(--t1);font-size:12px}
.sec-controls-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.tw{overflow-x:auto;max-height:400px;overflow-y:auto;border-radius:6px;border:1px solid var(--bdr);margin-bottom:16px}
.tw table{width:100%;border-collapse:collapse;font-size:12px}
.tw th,.tw td{padding:6px 8px;text-align:left;border-bottom:1px solid rgba(71,85,105,.4);white-space:nowrap}
.tw th{background:var(--bg2);color:var(--t2);font-weight:600;position:sticky;top:0;z-index:1}
.tw tr:hover{background:rgba(255,255,255,.02)}
.tw .mono{font-family:monospace;font-size:11px}
.tw .num{text-align:right}
.ep-toggle{cursor:pointer;color:var(--t2);font-size:12px;user-select:none;display:flex;align-items:center;gap:4px}
.ep-toggle:hover{color:var(--t1)}
.ep-arrow{display:inline-block;font-size:8px;transition:transform .15s}
.ep-arrow.open{transform:rotate(90deg)}
.ep-models{background:rgba(0,0,0,.15)}
.ep-models td{padding-left:24px!important}
.mo{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:var(--bg1);border-radius:10px;padding:20px;width:90%;max-width:420px}
.mt{font-size:17px;font-weight:600;margin-bottom:14px}
.fg2{margin-bottom:10px}.fl{display:block;font-size:13px;color:var(--t2);margin-bottom:3px}
.fi{width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--bdr);background:var(--bg0);color:var(--t1);font-size:13px}
.fi:focus{outline:none;border-color:var(--acc)}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.ma.eq{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));justify-content:stretch}
.ma.eq .b{width:100%;min-width:0;justify-content:center}
.toast{position:fixed;top:20px;right:20px;background:var(--bg2);border:1px solid var(--acc);color:var(--t1);padding:10px 18px;border-radius:8px;font-size:13px;z-index:2000;display:flex;align-items:center;gap:8px;opacity:0;transform:translateY(-10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.hidden{display:none!important}
.tm{color:var(--t2)}
.ak-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;border:1px solid var(--bdr);margin-bottom:6px;background:var(--bg0);transition:all .15s}
.ak-row:hover{border-color:var(--acc)}
.ak-row .ak-val{flex:1;font-family:monospace;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.ak-row .ak-masked{color:var(--t2)}
.ak-row .ak-full{display:none;word-break:break-all;white-space:normal}
.ak-row.show-full .ak-masked{display:none}
.ak-row.show-full .ak-full{display:block}
.empty{text-align:center;padding:40px 20px;color:var(--t2)}
.loading-screen{text-align:center;padding:60px 20px;color:var(--t2)}
.loading-screen .ld{width:24px;height:24px;border-width:3px;margin-bottom:12px}
.loading-screen p{font-size:14px}
.auto-refresh{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t2)}
.auto-refresh select{padding:3px 6px;border-radius:4px;border:1px solid var(--bdr);background:var(--bg2);color:var(--t1);font-size:11px}
.ar-btn{padding:3px 10px;border-radius:4px;border:1px solid var(--bdr);background:var(--bg2);color:var(--t1);font-size:11px;cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s;white-space:nowrap}
.ar-btn:hover{border-color:var(--acc);color:var(--acc)}
.ar-btn:disabled{opacity:.5;cursor:not-allowed}
.ar-btn .ld{width:10px;height:10px;border-width:1.5px}
@media(max-width:768px){.fg{grid-template-columns:1fr}.sb{flex-direction:column;align-items:flex-start}.tbar{gap:8px 12px;padding:10px 12px}.tbar .si{min-width:0}.tbar .sv{font-size:14px}.tbar .sl{font-size:10px}.hdr{flex-direction:column;align-items:flex-start}.hdr-right{width:100%;justify-content:space-between;flex-wrap:wrap}}
</style>
</head>
<body class="font-size-md">
<div class="ctn">
  <div class="hdr">
    <h1>CPA 管理面板</h1>
    <div class="hdr-right">
      <div class="hdr-info" id="hdrInfo"></div>
      <div style="display:flex;gap:6px;align-items:center">
        <select class="font-sel" onchange="document.body.className='font-size-'+this.value;localStorage.setItem('apm_font',this.value)"><option value="sm">小</option><option value="md" selected>中</option><option value="lg">大</option></select>
        <div class="auto-refresh"><select id="arSelect" onchange="setAutoRefresh(this.value);localStorage.setItem('apm_ar',this.value)"><option value="0">关闭</option><option value="30">30s</option><option value="60" selected>60s</option><option value="120">2m</option><option value="300">5m</option></select><button class="ar-btn" id="arBtn" onclick="manualRefresh()"><span id="arBtnText">刷新</span></button></div>
        <button class="b bp bsm" onclick="showAddModal()">+ 添加服务端</button>
      </div>
    </div>
  </div>
  <div id="credPanel"></div>
</div>
<div id="sModal" class="mo hidden"><div class="modal"><div class="mt" id="mt2">添加服务端</div><div class="fg2"><label class="fl">名称</label><input class="fi" id="sn" placeholder="例如: 生产环境"></div><div class="fg2"><label class="fl">API 地址</label><input class="fi" id="su" placeholder="例: 192.168.1.1:8317"></div><div class="fg2"><label class="fl">管理密钥</label><input type="password" class="fi" id="sk" placeholder="管理密钥"></div><div class="ma"><button class="b bs" onclick="hideSModal()">取消</button><button class="b bp" onclick="saveSrv()">保存</button></div></div></div>
<div id="dModal" class="mo hidden"><div class="modal"><div class="mt">确认删除</div><p id="dmsg" style="font-size:14px"></p><div class="ma"><button class="b bs" onclick="hideDModal()">取消</button><button class="b bd" onclick="confirmDel()">删除</button></div></div></div>
<div id="dlCredModal" class="mo hidden"><div class="modal" style="max-width:420px"><div class="mt">下载凭证</div><p id="dlCredMsg" style="font-size:13px;color:var(--t2);line-height:1.5;margin-bottom:14px"></p><div class="ma eq" style="justify-content:flex-start;flex-wrap:wrap"><button class="b bp" onclick="downloadCredOriginal()">CPA凭证</button><button class="b bp" onclick="downloadCredCodex()">Codex auth.json</button><button class="b bs" onclick="hideDlCredModal()">取消</button></div></div></div>
<div id="addCredModal" class="mo hidden"><div class="modal" style="max-width:520px"><div class="mt">添加凭证 <span id="addCredSrv" style="font-size:12px;color:var(--t2)"></span></div><div id="oauthStep1"><div style="font-size:13px;font-weight:600;margin-bottom:8px">OAuth 登录</div><div style="display:flex;gap:6px;flex-wrap:wrap" id="oauthBtns"></div></div><div id="oauthStep2" class="hidden"><div style="font-size:13px;font-weight:600;margin-bottom:8px">OAuth 授权 <span id="oauthProvider" class="bdg bdg-codex"></span> <span id="oauthPolling" style="font-size:11px;color:var(--t2)">等待授权中...</span></div><div style="font-size:12px;color:var(--t2);margin-bottom:6px">在浏览器中打开以下链接完成授权，或手动复制链接：</div><div style="background:var(--bg0);border:1px solid var(--bdr);border-radius:6px;padding:8px 10px;font-size:11px;word-break:break-all;max-height:60px;overflow-y:auto;margin-bottom:8px" id="oauthUrl"></div><div style="display:flex;gap:6px;margin-bottom:12px"><button class="b bs bsm" onclick="copyOAuthUrl()">复制链接</button><button class="b bp bsm" onclick="openOAuthUrl()">打开链接</button><button class="b bs bsm" onclick="cancelOAuth()">取消</button></div><div style="font-size:13px;font-weight:600;margin-bottom:6px">回填回调 URL</div><div style="font-size:11px;color:var(--t2);margin-bottom:6px">如果自动轮询未检测到授权完成，请将浏览器回调地址粘贴到下方：</div><div style="display:flex;gap:6px;margin-bottom:8px"><input class="fi" id="callbackUrl" placeholder="https://...callback?code=...&state=..." style="flex:1;font-size:12px"><button class="b bp bsm" onclick="submitCallback()">提交</button></div></div><div style="margin:12px 0;border-top:1px solid var(--bdr)"></div><div><div style="font-size:13px;font-weight:600;margin-bottom:8px">上传认证文件</div><div style="font-size:12px;color:var(--t2);margin-bottom:8px">选择 .json 认证文件上传到服务端</div><div style="display:flex;gap:8px;align-items:center"><input type="file" id="credFile" accept=".json" style="font-size:12px;color:var(--t2);flex:1"><button class="b bp bsm" onclick="uploadCredFile()">上传</button></div></div><div class="ma" style="margin-top:16px"><button class="b bs" onclick="hideAddCredModal()">关闭</button></div></div></div>
<div id="toast" class="toast"></div>

function renderCredSrv(srv,pf,sf){

function renderQC(p,c){if(c.error)return`<div class="qe">错误: ${esc(c.error)}</div>`;if(!c.data)return'<div class="qempty" style="cursor:default">暂无数据</div>';if(p==='claude')return rCl(c.data);if(p==='codex')return rCo(c.data);if(p==='gemini-cli')return rGe(c.data);if(p==='antigravity')return rAn(c.data);if(p==='kimi')return rKi(c.data);return'<div class="qempty" style="cursor:default">不支持</div>'}
function rCl(d){const w=[];Object.entries(d.limits||{}).forEach(([k,v])=>{if(v&&typeof v==='object'&&'utilization'in v){const u=v.utilization||0,r=Math.max(0,100-u),c=u>70?'h':u>30?'m':'l';w.push(`<div class="qi"><div class="qih"><span class="ql">${fCWL(k)}</span><span class="qv" style="color:${r<30?'var(--err)':'inherit'}">${r.toFixed(0)}%</span></div><div class="pbar"><div class="pfill ${c}" style="width:${r}%"></div></div>${v.resets_at?`<div class="qm">重置于 ${fmtTs(v.resets_at)}</div>`:''}</div>`)}});return w.join('')||'<div class="qempty" style="cursor:default">暂无</div>'}
function rCo(d){const rl=d.rate_limit||d.rateLimit||{},w=[];const pw=rl.primary_window||rl.primaryWindow;if(pw){const u=pw.used_percent||pw.usedPercent||0,r=100-u,c=u>70?'h':u>30?'m':'l';const rt=pw.reset_at||pw.reset_time||pw.reset_at_timestamp;w.push(`<div class="qi"><div class="qih"><span class="ql">5小时</span><span class="qv" style="color:${r<30?'var(--err)':'inherit'}">${r.toFixed(0)}%</span></div><div class="pbar"><div class="pfill ${c}" style="width:${r}%"></div></div>${rt?`<div class="qm">恢复于 ${fmtResetTime(rt)}</div>`:''}</div>`)}const sw=rl.secondary_window||rl.secondaryWindow;if(sw){const u=sw.used_percent||sw.usedPercent||0,r=100-u,c=u>70?'h':u>30?'m':'l';const rt=sw.reset_at||sw.reset_time||sw.reset_at_timestamp;w.push(`<div class="qi"><div class="qih"><span class="ql">周</span><span class="qv" style="color:${r<30?'var(--err)':'inherit'}">${r.toFixed(0)}%</span></div><div class="pbar"><div class="pfill ${c}" style="width:${r}%"></div></div>${rt?`<div class="qm">恢复于 ${fmtResetTime(rt)}</div>`:''}</div>`)}return w.join('')||'<div class="qempty" style="cursor:default">暂无</div>'}
function rGe(d){const bs=d.buckets||[];if(!bs.length)return'<div class="qempty" style="cursor:default">暂无</div>';return bs.slice(0,5).map(b=>{const r=(b.remaining_fraction??b.remainingFraction??0)*100,c=r<30?'h':r<70?'m':'l';const rt=b.resetTime||b.reset_time;return`<div class="qi"><div class="qih"><span class="ql" style="max-width:130px;overflow:hidden;text-overflow:ellipsis">${esc(b.model_id||b.modelId||'?')}</span><span class="qv" style="color:${r<30?'var(--err)':'inherit'}">${r.toFixed(0)}%</span></div><div class="pbar"><div class="pfill ${c}" style="width:${r}%"></div></div>${rt?`<div class="qm">恢复于 ${fmtResetTime(rt)}</div>`:''}</div>`}).join('')}
function rAn(d){if(!d?.models)return'<div class="qempty" style="cursor:default">暂无</div>';return Object.entries(d.models).slice(0,5).map(([k,v])=>{if(!v||typeof v!=='object')return'';const p=(v.remaining_fraction??v.remainingFraction??0)*100,c=p<30?'h':p<70?'m':'l';const rt=v.resetTime||v.reset_time;return`<div class="qi"><div class="qih"><span class="ql" style="max-width:130px;overflow:hidden;text-overflow:ellipsis">${esc(k)}</span><span class="qv" style="color:${p<30?'var(--err)':'inherit'}">${p.toFixed(0)}%</span></div><div class="pbar"><div class="pfill ${c}" style="width:${p}%"></div></div>${rt?`<div class="qm">恢复于 ${fmtResetTime(rt)}</div>`:''}</div>`}).filter(Boolean).join('')||'<div class="qempty" style="cursor:default">暂无</div>'}
function rKi(d){if(!Array.isArray(d))return'<div class="qempty" style="cursor:default">暂无</div>';return d.slice(0,5).map(i=>{const u=i.used||0,l=i.limit||0,r=l>0?Math.max(0,100-(u/l*100)):100,c=r<30?'h':r<70?'m':'l';return`<div class="qi"><div class="qih"><span class="ql">${esc(i.label||i.model||'?')}</span><span class="qv" style="color:${r<30?'var(--err)':'inherit'}">${r.toFixed(0)}%</span></div><div class="pbar"><div class="pfill ${c}" style="width:${r}%"></div></div>${l>0?`<div class="qm">${u}/${l}</div>`:''}</div>`}).join('')||'<div class="qempty" style="cursor:default">暂无</div>'}

async function loadSettingsCfg(){const s=servers.find(x=>x.id===stSrvId);if(!s)return;const cfg={};const endpoints=[{key:'proxy-url',path:'/proxy-url',label:'代理 URL',type:'text',placeholder:'例如: socks5://user:pass@host:1080/'},{key:'request-retry',path:'/request-retry',label:'请求重试次数',type:'number',placeholder:'0'},{key:'routing/strategy',path:'/routing/strategy',label:'路由策略',type:'select',options:[{v:'round-robin',l:'round-robin (轮询)'},{v:'fill-first',l:'fill-first (填满优先)'}]}];
await Promise.allSettled(endpoints.map(async ep=>{try{const r=await fetch(`${s.url}/v0/management${ep.path}`,{headers:{'Authorization':`Bearer ${s.key}`}});if(r.ok){const d=await r.json();cfg[ep.key]=d[ep.key]??d.value??''}else cfg[ep.key]=null}catch{cfg[ep.key]=null}}));
const c=document.getElementById('stContent');if(!c)return;let h='';endpoints.forEach(ep=>{const v=cfg[ep.key];h+=`<div style="background:var(--bg0);border-radius:6px;padding:10px 12px;border:1px solid var(--bdr)"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-size:13px;font-weight:600">${ep.label}</span>${v!==null?`<span style="font-size:11px;color:var(--t2)">当前: <strong style="color:var(--t1)">${esc(String(v))}</strong></span>`:''}</div>`;
if(v===null){h+=`<div style="font-size:12px;color:var(--t2)">此服务端不支持该配置</div>`}else if(ep.type==='select'){h+=`<div style="display:flex;gap:6px;align-items:center"><select class="fi" id="st_${ep.key}" style="flex:1;font-size:12px">${ep.options.map(o=>`<option value="${esc(o.v)}" ${String(v)===o.v?'selected':''}>${esc(o.l)}</option>`).join('')}</select><button class="b bp bsm" onclick="saveStCfg('${ep.key}','${ep.path}')">保存</button></div>`}else{h+=`<div style="display:flex;gap:6px;align-items:center"><input class="fi" id="st_${ep.key}" type="${ep.type}" value="${esc(String(v))}" placeholder="${ep.placeholder}" style="flex:1;font-size:12px"><button class="b bp bsm" onclick="saveStCfg('${ep.key}','${ep.path}')">保存</button>${v?`<button class="b bs bsm" onclick="clearStCfg('${ep.path}')">清除</button>`:''}</div>`}
h+='</div>'});c.innerHTML=h;document.getElementById('stLoading').classList.add('hidden');c.classList.remove('hidden')}
async function saveStCfg(key,path){const s=servers.find(x=>x.id===stSrvId);if(!s)return;const inp=document.getElementById('st_'+key);if(!inp)return;let v=inp.value.trim();if(inp.type==='number')v=parseInt(v)||0;try{const r=await fetch(`${s.url}/v0/management${path}`,{method:'PUT',headers:{'Authorization':`Bearer ${s.key}`,'Content-Type':'application/json'},body:JSON.stringify({value:v})});if(!r.ok)throw new Error(`HTTP ${r.status}`);showToast('保存成功');loadSettingsCfg()}catch(e){showToast('保存失败: '+e.message)}}
async function clearStCfg(path){const s=servers.find(x=>x.id===stSrvId);if(!s)return;try{const r=await fetch(`${s.url}/v0/management${path}`,{method:'DELETE',headers:{'Authorization':`Bearer ${s.key}`}});if(!r.ok)throw new Error(`HTTP ${r.status}`);showToast('已清除');loadSettingsCfg()}catch(e){showToast('清除失败: '+e.message)}}
</script>
</body>
</html>
